<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Indovina l'Alunno</title>
<style>
  :root{
    --bg:#0e1230;
    --bg2:#161b42;
    --surface:#1d2350;
    --surface-2:#252c63;
    --line:rgba(255,255,255,.10);
    --ink:#f4f1ff;
    --muted:#a7add6;
    --amber:#ffb24c;
    --coral:#ff6b5e;
    --mint:#3ddc97;
    --rose:#ff5b8a;
    --r-lg:22px;
    --r-md:16px;
    --r-sm:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Inter","Helvetica Neue",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 75% -10%, rgba(255,178,76,.12), transparent 60%),
      radial-gradient(1000px 500px at 0% 110%, rgba(61,220,151,.10), transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;
    overflow-x:hidden;
  }
  .wrap{width:100%;max-width:460px;min-height:100dvh;padding:26px 18px 40px;display:flex;flex-direction:column;}
  .screen{display:none;flex:1;flex-direction:column;}
  .screen.active{display:flex;animation:rise .45s cubic-bezier(.22,.61,.36,1);}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

  /* ============ HOME ============ */
  .hero{padding:14px 2px 2px;}
  .kicker{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.72rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
    color:var(--amber);margin-bottom:22px;
  }
  .kicker::before{content:"";width:26px;height:1px;background:var(--amber);display:inline-block;}
  .hero h1{font-size:clamp(2.9rem,13vw,3.9rem);line-height:.96;font-weight:800;letter-spacing:-.03em;}
  .hero h1 .l{display:block;color:var(--ink);}
  .hero h1 .a{display:block;font-style:italic;font-weight:700;
    background:linear-gradient(95deg,var(--amber),var(--coral));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero .sub{color:var(--muted);font-size:1.06rem;line-height:1.5;margin:22px 0 6px;max-width:38ch;}
  .hero .sub b{color:var(--ink);font-weight:600;}

  .pick-label{
    font-size:.74rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:34px 0 14px;display:flex;align-items:center;gap:10px;
  }
  .pick-label::after{content:"";flex:1;height:1px;background:var(--line);}
  .prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .prof-btn{
    font-family:inherit;font-weight:600;font-size:1.06rem;color:var(--ink);text-align:left;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:15px 16px;cursor:pointer;display:flex;flex-direction:column;gap:3px;
    transition:transform .15s,border-color .15s,background .15s;
  }
  .prof-btn .pre{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .prof-btn:hover,.prof-btn:active{transform:translateY(-2px);border-color:var(--amber);background:var(--surface-2);}

  /* ============ GIOCO ============ */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .who{
    font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--bg);background:var(--amber);padding:7px 13px;border-radius:999px;white-space:nowrap;
  }
  .pbar{flex:1;height:6px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;}
  .pbar i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--mint),var(--amber));transition:width .5s cubic-bezier(.22,.61,.36,1);}
  .count{font-size:.82rem;font-weight:700;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;}

  .photo-card{
    background:linear-gradient(180deg,var(--surface),var(--bg2));
    border:1px solid var(--line);border-radius:var(--r-lg);
    padding:12px;margin-bottom:18px;box-shadow:0 24px 50px -20px rgba(0,0,0,.7);
    position:relative;
  }
  .photo-stage{
    width:100%;border-radius:var(--r-md);overflow:hidden;background:#0a0d22;
    display:flex;align-items:center;justify-content:center;
    min-height:240px;max-height:60vh;position:relative;
  }
  .photo-stage img{display:block;width:100%;height:auto;max-height:60vh;object-fit:contain;
    transition:transform .35s cubic-bezier(.22,.61,.36,1);transform-origin:center center;cursor:zoom-in;}
  .photo-stage img.zoomed{transform:scale(2.1);cursor:zoom-out;}
  .zoom-hint{
    position:absolute;right:12px;bottom:12px;z-index:5;pointer-events:none;
    background:rgba(10,13,34,.7);backdrop-filter:blur(4px);color:var(--ink);
    font-size:.66rem;font-weight:600;letter-spacing:.05em;padding:6px 10px;border-radius:999px;
    border:1px solid var(--line);opacity:.85;transition:opacity .3s;
  }
  .photo-stage img.zoomed ~ .zoom-hint{opacity:0;}
  .q-tag{font-size:.92rem;font-weight:600;color:var(--muted);text-align:center;margin-bottom:14px;}

  /* dropdown */
  .selector{position:relative;}
  .sel-trigger{
    width:100%;font-family:inherit;font-size:1.08rem;font-weight:600;color:var(--ink);text-align:left;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:17px 50px 17px 18px;cursor:pointer;position:relative;
    transition:border-color .15s,background .15s;
  }
  .sel-trigger:hover{border-color:var(--amber);}
  .sel-trigger.placeholder{color:var(--muted);font-weight:500;}
  .sel-trigger::after{
    content:"";position:absolute;right:20px;top:50%;width:9px;height:9px;
    border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);
    transform:translateY(-70%) rotate(45deg);transition:transform .2s;
  }
  .selector.open .sel-trigger::after{transform:translateY(-30%) rotate(-135deg);}
  .sel-list{
    position:absolute;left:0;right:0;top:calc(100% + 8px);z-index:30;
    background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);
    max-height:46vh;overflow-y:auto;box-shadow:0 26px 50px -10px rgba(0,0,0,.6);
    display:none;padding:6px;
  }
  .selector.open .sel-list{display:block;animation:drop .2s ease;}
  @keyframes drop{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
  .sel-opt{
    font-family:inherit;font-size:1.04rem;font-weight:500;color:var(--ink);text-align:left;
    width:100%;background:transparent;border:none;border-radius:var(--r-sm);
    padding:15px 14px;cursor:pointer;transition:background .12s;
  }
  .sel-opt:hover{background:rgba(255,255,255,.07);}

  .confirm-btn{
    width:100%;font-family:inherit;font-weight:700;font-size:1.05rem;letter-spacing:.02em;
    color:var(--bg);background:var(--amber);border:none;border-radius:var(--r-md);
    padding:16px;cursor:pointer;margin-top:12px;
    transition:transform .15s,opacity .2s,background .15s;
  }
  .confirm-btn:hover{background:#ffbe66;}
  .confirm-btn:active{transform:scale(.99);}
  .confirm-btn[disabled]{opacity:.3;cursor:default;background:var(--surface-2);color:var(--muted);}

  /* ============ REVEAL TEATRALE ============ */
  .reveal{margin-top:6px;text-align:center;display:none;}
  .reveal.show{display:block;}

  /* fase 1: sospensione */
  .suspense{display:none;flex-direction:column;align-items:center;gap:14px;padding:6px 0 2px;}
  .suspense.show{display:flex;}
  .suspense .dots{display:flex;gap:9px;}
  .suspense .dots i{
    width:11px;height:11px;border-radius:50%;background:var(--amber);
    animation:pulse 1s infinite ease-in-out;
  }
  .suspense .dots i:nth-child(2){animation-delay:.18s;}
  .suspense .dots i:nth-child(3){animation-delay:.36s;}
  @keyframes pulse{0%,100%{transform:scale(.6);opacity:.35;}50%{transform:scale(1);opacity:1;}}
  .suspense .label{font-size:.82rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}

  /* fase 2: verdetto */
  .verdict-card{display:none;}
  .verdict-card.show{display:block;animation:rise .3s;}
  .vc-badge{
    display:inline-flex;align-items:center;gap:8px;
    font-weight:800;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;
    padding:9px 18px;border-radius:999px;margin-bottom:16px;
    animation:badgePop .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes badgePop{0%{transform:scale(0);}70%{transform:scale(1.12);}100%{transform:scale(1);}}
  .reveal.ok .vc-badge{background:rgba(61,220,151,.16);color:var(--mint);box-shadow:0 0 0 1px rgba(61,220,151,.3);}
  .reveal.ko .vc-badge{background:rgba(255,91,138,.16);color:var(--rose);box-shadow:0 0 0 1px rgba(255,91,138,.3);}
  .vc-name{
    font-size:2.1rem;font-weight:800;letter-spacing:-.02em;line-height:1.05;
    animation:nameReveal .55s cubic-bezier(.22,.61,.36,1);
  }
  .reveal.ok .vc-name{background:linear-gradient(95deg,var(--mint),#9af0cd);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .reveal.ko .vc-name{color:var(--ink);}
  @keyframes nameReveal{from{opacity:0;transform:translateY(14px) scale(.96);filter:blur(6px);}
    to{opacity:1;transform:none;filter:blur(0);}}
  .vc-wrong{font-size:.92rem;font-weight:500;color:var(--muted);margin-top:10px;animation:rise .5s .15s both;}
  .vc-wrong b{color:var(--rose);font-weight:600;}

  .next-btn{
    width:100%;font-family:inherit;font-weight:700;font-size:1.05rem;
    color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-md);
    padding:16px;cursor:pointer;margin-top:22px;transition:transform .15s,border-color .15s;
  }
  .next-btn:hover{border-color:var(--amber);}
  .next-btn:active{transform:scale(.99);}

  /* ============ RISULTATO ============ */
  .result{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:8px 0;}
  .res-kicker{font-size:.74rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}
  .res-prof{font-size:1.05rem;font-weight:600;color:var(--muted);margin-bottom:22px;}
  .res-prof b{color:var(--ink);}

  /* PUNTEGGIO GIGANTE */
  .bigscore{
    line-height:.82;font-weight:800;letter-spacing:-.04em;margin:4px 0 2px;
    background:linear-gradient(160deg,#fff,var(--amber) 55%,var(--coral));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:scoreIn .7s cubic-bezier(.34,1.56,.64,1);
  }
  .bigscore .num{font-size:clamp(6rem,42vw,11rem);display:inline-block;}
  @keyframes scoreIn{0%{opacity:0;transform:scale(.3) rotate(-8deg);}60%{transform:scale(1.06);}100%{opacity:1;transform:none;}}
  .bigscore-of{font-size:1.5rem;font-weight:700;color:var(--muted);letter-spacing:.02em;margin-bottom:6px;
    animation:rise .6s .2s both;}
  .bigscore-of b{color:var(--ink);}
  .scoremeter{
    height:12px;width:min(280px,80%);margin:14px auto 0;background:rgba(255,255,255,.10);
    border-radius:999px;overflow:hidden;animation:rise .6s .25s both;
  }
  .scoremeter i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--mint),var(--amber),var(--coral));
    transition:width 1s cubic-bezier(.22,.61,.36,1) .35s;}

  .verdict-line{font-size:1.75rem;font-weight:800;letter-spacing:-.02em;margin:26px 14px 6px;animation:rise .6s .35s both;}
  .verdict-sub{color:var(--muted);font-size:1.02rem;line-height:1.5;margin:0 18px 24px;animation:rise .6s .42s both;}
  .recap{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:6px;margin-bottom:14px;max-height:230px;overflow-y:auto;}
  .recap div{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px 14px;border-radius:var(--r-sm);font-size:.96rem;font-weight:600;}
  .recap div+div{border-top:1px solid var(--line);}
  .recap .ok{color:var(--mint);}
  .recap .ko{color:var(--rose);}
  .recap .ko .r{color:var(--muted);font-weight:500;font-size:.84rem;}
  .recap-toggle{
    width:100%;font-family:inherit;font-weight:600;font-size:.86rem;color:var(--muted);
    background:transparent;border:1px solid var(--line);border-radius:var(--r-md);
    padding:12px;cursor:pointer;margin-bottom:14px;transition:border-color .15s,color .15s;
  }
  .recap-toggle:hover{border-color:var(--amber);color:var(--ink);}
  .start-over{
    width:100%;font-family:inherit;font-weight:700;font-size:1.05rem;color:var(--bg);
    background:var(--amber);border:none;border-radius:var(--r-md);padding:16px;cursor:pointer;
    transition:transform .15s,background .15s;
  }
  .start-over:hover{background:#ffbe66;}
  .start-over:active{transform:scale(.99);}
  footer{text-align:center;color:var(--muted);opacity:.5;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;padding:18px 0 2px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="hero">
      <span class="kicker">Cena di classe · 5ª</span>
      <h1><span class="l">Indovina</span><span class="a">l'Alunno</span></h1>
      <p class="sub">Li avete cresciuti per cinque anni. Ma li riconoscete <b>da bambini?</b></p>
    </div>
    <p class="pick-label">Professore, scegli il tuo nome</p>
    <div id="profGrid" class="prof-grid"></div>
  </section>

  <!-- ===== GIOCO ===== -->
  <section id="game" class="screen">
    <div class="topbar">
      <span class="who" id="whoLabel">Prof</span>
      <div class="pbar"><i id="pbarFill"></i></div>
      <span class="count" id="counter">1/27</span>
    </div>

    <div class="photo-card">
      <div class="photo-stage">
        <img id="photo" alt="Bambino da indovinare">
        <span class="zoom-hint">tocca per ingrandire</span>
      </div>
    </div>
    <p class="q-tag">Chi è questo bambino?</p>

    <div class="selector" id="selector">
      <button class="sel-trigger placeholder" id="selTrigger">Scegli un nome…</button>
      <div class="sel-list" id="selList"></div>
    </div>
    <button class="confirm-btn" id="confirmBtn" disabled>Conferma</button>

    <div class="reveal" id="reveal">
      <div class="suspense" id="suspense">
        <div class="dots"><i></i><i></i><i></i></div>
        <span class="label">Era…</span>
      </div>
      <div class="verdict-card" id="verdictCard">
        <span class="vc-badge" id="vcBadge"></span>
        <div class="vc-name" id="vcName"></div>
        <div class="vc-wrong" id="vcWrong"></div>
        <button class="next-btn" id="nextBtn">Avanti</button>
      </div>
    </div>
  </section>

  <!-- ===== RISULTATO ===== -->
  <section id="end" class="screen">
    <div class="result">
      <p class="res-kicker">La pagella di</p>
      <p class="res-prof" id="resProf">Prof.</p>
      <div class="bigscore"><span class="num" id="finalScore">0</span></div>
      <p class="bigscore-of">su <b id="finalOf">27</b> alunni</p>
      <div class="scoremeter"><i id="scoreFill"></i></div>
      <p class="verdict-line" id="verdictLine"></p>
      <p class="verdict-sub" id="verdictSub"></p>
      <button class="recap-toggle" id="recapToggle">Vedi le risposte ▾</button>
      <div class="recap" id="recap" style="display:none;"></div>
      <button class="start-over" id="restartBtn">Passa al prossimo professore</button>
    </div>
  </section>

  <footer>Indovina l'Alunno · Classe 5ª</footer>
</div>

<script>
/* ===================== DATI ===================== */
const PROFS = ["Biasi","Basilico","Procopio","Fusetti","Visnoviz",
               "Cattaneo","Ceschina","Travaglini","Zaffaroni","Capra","Borghi"];

// sex: "m" o "f" — filtra le opzioni del menù
// Per aggiungere un alunno: aggiungi una riga e carica la foto in /foto
const STUDENTS = [
  {n:"Alessandro Cogliati",   f:"AlessandroCogliati.jpeg",  sex:"m"},
  {n:"Alessia Borghi",        f:"AlessiaBorghi.jpeg",       sex:"f"},
  {n:"Anita Vernazzano",      f:"AnitaVernazzano.jpeg",     sex:"f"},
  {n:"Anna Avezza",           f:"AnnaAvezza.jpeg",          sex:"f"},
  {n:"Chiara Boraschi",       f:"ChiaraBoraschi.jpeg",      sex:"f"},
  {n:"Edoardo Valerio",       f:"EdoardoValerio.jpeg",      sex:"m"},
  {n:"Emma Dante",            f:"EmmaDante.jpeg",           sex:"f"},
  {n:"Filippo Tragella",      f:"FilippoTragella.jpeg",     sex:"m"},
  {n:"Francesco Balzaretti",  f:"FrancescoBalzaretti.jpeg", sex:"m"},
  {n:"Francesco Giardina",    f:"FrancescoGiardina.jpeg",   sex:"m"},
  {n:"Francesco Paolillo",    f:"FrancescoPaolillo.jpeg",   sex:"m"},
  {n:"Francesco Robbiati",    f:"FrancescoRobbiati.jpeg",   sex:"m"},
  {n:"Giacomo Castiglioni",   f:"GiacomoCastiglioni.jpeg",  sex:"m"},
  {n:"Giorgia De Vita",       f:"GiorgiaDeVita.jpeg",       sex:"f"},
  {n:"Lorenzo Cattaneo",      f:"LorenzoCattaneo.jpeg",     sex:"m"},
  {n:"Marini Robel",          f:"MariniRobel.jpeg",         sex:"m"},
  {n:"Martina Locati",        f:"MartinaLocati.jpeg",       sex:"f"},
  {n:"Mattia Pettinari",      f:"MattiaPettinari.jpeg",     sex:"m"},
  {n:"Nicolò Sordelli",       f:"NicoloSordelli.jpeg",      sex:"m"},
  {n:"Riccardo Lonardoni",    f:"RiccardoLonardoni.jpg",    sex:"m"},
  {n:"Simone Tettamanzi",     f:"SimoneTettamanzi.jpeg",    sex:"m"},
  {n:"Sofia Morlino",         f:"SofiaMorlino.jpeg",        sex:"f"},
  {n:"Stefano Galante",       f:"StefanoGalante.jpeg",      sex:"m"},
  {n:"Tommaso Porcu",         f:"TommasoPorcu.jpeg",        sex:"m"},
  {n:"Tommaso Ravera",        f:"TommasoRavera.jpeg",       sex:"m"},
  {n:"Valentina Tomba",       f:"ValentinaTomba.jpeg",      sex:"f"},
  {n:"Zainab Mohamed",        f:"ZainabMohamed.jpeg",       sex:"f"}
];

const NAMES_M = STUDENTS.filter(s=>s.sex==="m").map(s=>s.n).sort((a,b)=>a.localeCompare(b,'it'));
const NAMES_F = STUDENTS.filter(s=>s.sex==="f").map(s=>s.n).sort((a,b)=>a.localeCompare(b,'it'));

let prof="", order=[], step=0, score=0, answers=[], selected=null, locked=false;
const $ = id => document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');window.scrollTo(0,0);}
function buzz(ms){ if(navigator.vibrate){ try{navigator.vibrate(ms);}catch(e){} } }

/* ===== HOME ===== */
function buildHome(){
  const g=$('profGrid'); g.innerHTML='';
  PROFS.forEach(p=>{
    const b=document.createElement('button');
    b.className='prof-btn';
    b.innerHTML='<span class="pre">Prof.</span>'+p;
    b.onclick=()=>startGame(p);
    g.appendChild(b);
  });
}

function startGame(p){
  prof=p; order=shuffle(STUDENTS.map((_,i)=>i)); step=0; score=0; answers=[];
  $('whoLabel').textContent='Prof. '+p;
  show('game'); renderQuestion();
}

/* ===== GIOCO ===== */
function renderQuestion(){
  const s=STUDENTS[order[step]];
  selected=null; locked=false;
  $('counter').textContent=(step+1)+'/'+STUDENTS.length;
  $('pbarFill').style.width=(step/STUDENTS.length*100)+'%';
  const img=$('photo'); img.src='./foto/'+s.f; img.classList.remove('zoomed');

  $('selector').classList.remove('open');
  const trig=$('selTrigger'); trig.textContent='Scegli un nome…'; trig.classList.add('placeholder');
  $('confirmBtn').disabled=true;
  $('reveal').className='reveal';
  $('suspense').className='suspense';
  $('verdictCard').className='verdict-card';
  $('selector').style.display=''; $('confirmBtn').style.display='';

  const names = s.sex==="f" ? NAMES_F : NAMES_M;
  const list=$('selList'); list.innerHTML='';
  names.forEach(name=>{
    const o=document.createElement('button');
    o.className='sel-opt'; o.textContent=name;
    o.onclick=()=>{selected=name;trig.textContent=name;trig.classList.remove('placeholder');
      $('selector').classList.remove('open');$('confirmBtn').disabled=false;};
    list.appendChild(o);
  });
}

// zoom foto (tocca per ingrandire / rimpicciolire)
$('photo').onclick=()=>{ $('photo').classList.toggle('zoomed'); };

$('selTrigger').onclick=()=>{ if(!locked) $('selector').classList.toggle('open'); };
document.addEventListener('click',e=>{ if(!$('selector').contains(e.target)) $('selector').classList.remove('open'); });

$('confirmBtn').onclick=()=>{
  if(!selected||locked) return;
  locked=true;
  const s=STUDENTS[order[step]];
  const ok=selected===s.n;
  if(ok) score++;
  answers.push({name:s.n,given:selected,ok});

  // chiudi input, parte la sospensione teatrale
  $('selector').style.display='none'; $('confirmBtn').style.display='none';
  $('photo').classList.remove('zoomed');
  const rv=$('reveal'); rv.className='reveal show '+(ok?'ok':'ko');
  $('suspense').className='suspense show';
  buzz(20);

  // dopo ~1.1s rivela il verdetto
  setTimeout(()=>{
    $('suspense').className='suspense';
    $('verdictCard').className='verdict-card show';
    $('vcBadge').textContent = ok?'✓ Esatto':'✗ Sbagliato';
    $('vcName').textContent = s.n;
    $('vcWrong').innerHTML = ok ? '' : 'Tu avevi detto <b>'+selected+'</b>';
    buzz(ok?[0,40,60,40]:120);
    $('nextBtn').textContent=(step===STUDENTS.length-1)?'Vedi la pagella':'Avanti';
  },1100);
};

$('nextBtn').onclick=()=>{step++;(step>=STUDENTS.length)?endGame():renderQuestion();};

/* ===== RISULTATO ===== */
function endGame(){
  $('pbarFill').style.width='100%';
  const tot=STUDENTS.length, pct=score/tot;
  $('resProf').innerHTML='Prof. <b>'+prof+'</b>';
  $('finalOf').textContent=tot;

  // conteggio animato del punteggio
  const fs=$('finalScore'); let cur=0;
  fs.textContent='0';
  const dur=900, t0=performance.now();
  function tick(now){
    const p=Math.min((now-t0)/dur,1);
    const eased=1-Math.pow(1-p,3);
    fs.textContent=Math.round(eased*score);
    if(p<1) requestAnimationFrame(tick); else fs.textContent=score;
  }
  requestAnimationFrame(tick);
  setTimeout(()=>{ $('scoreFill').style.width=(pct*100)+'%'; },50);

  let line,sub;
  if(pct===1){line='Memoria fotografica';sub='Tutti, dal primo all\u2019ultimo. Niente da dire.';}
  else if(pct>=.75){line='Promosso a pieni voti';sub='Li conosci davvero, questi ragazzi.';}
  else if(pct>=.5){line='Promosso';sub='Te la sei cavata. Qualcuno è cambiato parecchio, eh?';}
  else if(pct>=.25){line='Rimandato a settembre';sub='Diciamo che li riconosci meglio in aula.';}
  else{line='Bocciato, con affetto';sub='Senza zaino e interrogazioni è tutta un\u2019altra storia.';}
  $('verdictLine').textContent=line; $('verdictSub').textContent=sub;
  buzz([0,50,80,50]);

  const r=$('recap'); r.innerHTML=''; r.style.display='none';
  $('recapToggle').textContent='Vedi le risposte ▾';
  answers.forEach(a=>{
    const d=document.createElement('div');
    if(a.ok){d.className='ok';d.innerHTML='<span>✓&nbsp;&nbsp;'+a.name+'</span>';}
    else{d.className='ko';d.innerHTML='<span>✗&nbsp;&nbsp;'+a.name+'</span><span class="r">'+a.given+'</span>';}
    r.appendChild(d);
  });
  show('end');
}

$('recapToggle').onclick=()=>{
  const r=$('recap'); const open=r.style.display!=='none';
  r.style.display=open?'none':'block';
  $('recapToggle').textContent=open?'Vedi le risposte ▾':'Nascondi le risposte ▴';
};

$('restartBtn').onclick=()=>show('home');
buildHome();
</script>
