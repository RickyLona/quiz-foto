<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Indovina l'Alunno!</title>
<style>
  :root{
    --grape:#6c2bd9;      /* viola elettrico */
    --grape-d:#4c1d95;
    --pink:#ff3d81;       /* magenta */
    --tang:#ff8a3d;       /* arancio */
    --lemon:#ffd23d;      /* giallo */
    --mint:#1fd6a6;       /* verde acqua */
    --sky:#36c5f0;        /* azzurro */
    --ink:#1c1340;        /* viola scurissimo per testo */
    --cream:#fff6ee;
    --white:#ffffff;
    --sq:38% / 50%;       /* curvatura squircle morbida */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Baloo 2","Trebuchet MS","Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 12% 8%, rgba(255,210,61,.55), transparent 38%),
      radial-gradient(circle at 88% 14%, rgba(255,61,129,.5), transparent 40%),
      radial-gradient(circle at 78% 92%, rgba(31,214,166,.5), transparent 42%),
      radial-gradient(circle at 8% 88%, rgba(54,197,240,.5), transparent 40%),
      linear-gradient(160deg,#7c3aed,#5b21b6);
    background-attachment:fixed;
    min-height:100dvh;
    display:flex;justify-content:center;align-items:flex-start;
    overflow-x:hidden;
  }
  .wrap{width:100%;max-width:480px;min-height:100dvh;padding:20px 16px 36px;display:flex;flex-direction:column;}
  .screen{display:none;flex:1;flex-direction:column;}
  .screen.active{display:flex;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{from{opacity:0;transform:scale(.94) translateY(14px);}to{opacity:1;transform:none;}}

  .blob-title{
    text-align:center;color:#fff;font-weight:800;line-height:.95;
    text-shadow:0 4px 0 rgba(0,0,0,.12);
  }

  /* ============ HOME ============ */
  .hero{text-align:center;padding:8px 0 4px;}
  .badge{
    display:inline-block;background:var(--lemon);color:var(--ink);
    font-weight:800;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;
    padding:7px 16px;border-radius:999px;margin-bottom:18px;
    box-shadow:0 4px 0 #d9a800;transform:rotate(-2deg);
  }
  .hero h1{
    color:#fff;font-weight:800;font-size:clamp(2.7rem,15vw,4rem);line-height:.9;
    letter-spacing:-.02em;text-shadow:0 5px 0 rgba(0,0,0,.14);
  }
  .hero h1 .word{display:block;}
  .hero h1 .pop{
    color:var(--lemon);font-size:1.18em;
    -webkit-text-stroke:2px var(--ink);paint-order:stroke fill;
    transform:rotate(-3deg);display:inline-block;
  }
  .hero p{color:#ffe9d6;font-size:1.1rem;font-weight:600;margin:18px 12px 6px;line-height:1.45;}

  .pick{
    color:#fff;text-align:center;font-weight:800;font-size:.82rem;
    letter-spacing:.14em;text-transform:uppercase;margin:26px 0 14px;opacity:.92;
  }
  .prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .prof-btn{
    font-family:inherit;font-weight:700;font-size:1.18rem;color:var(--ink);
    background:var(--white);border:none;border-radius:var(--sq);
    padding:18px 8px 16px;cursor:pointer;position:relative;
    box-shadow:0 6px 0 rgba(0,0,0,.16);
    transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .12s;
  }
  .prof-btn:active{transform:translateY(4px) scale(.99);box-shadow:0 2px 0 rgba(0,0,0,.16);}
  .prof-btn .pre{display:block;font-size:.62rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:2px;opacity:.55;}
  .prof-btn:nth-child(6n+1){background:linear-gradient(150deg,#fff,#ffe6f0);}
  .prof-btn:nth-child(6n+2){background:linear-gradient(150deg,#fff,#fff0d6);}
  .prof-btn:nth-child(6n+3){background:linear-gradient(150deg,#fff,#d9f7ef);}
  .prof-btn:nth-child(6n+4){background:linear-gradient(150deg,#fff,#dcf1fb);}
  .prof-btn:nth-child(6n+5){background:linear-gradient(150deg,#fff,#ece2ff);}
  .prof-btn:nth-child(6n)  {background:linear-gradient(150deg,#fff,#ffe9dd);}

  /* ============ GIOCO ============ */
  .topbar{display:flex;align-items:center;gap:10px;margin:2px 0 14px;}
  .pill-who{
    background:var(--lemon);color:var(--ink);font-weight:800;font-size:.82rem;
    padding:8px 16px;border-radius:999px;box-shadow:0 4px 0 #d9a800;white-space:nowrap;
  }
  .pbar{flex:1;height:14px;background:rgba(255,255,255,.28);border-radius:999px;overflow:hidden;}
  .pbar i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--mint),var(--lemon),var(--pink));
    transition:width .45s cubic-bezier(.34,1.56,.64,1);}
  .count{color:#fff;font-weight:800;font-size:.92rem;white-space:nowrap;}

  .photo-card{
    background:#fff;border-radius:var(--sq);padding:14px;
    box-shadow:0 14px 34px rgba(28,19,64,.36);margin-bottom:4px;
    animation:wob .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes wob{from{transform:scale(.9) rotate(-2deg);opacity:0;}to{transform:none;opacity:1;}}
  .photo-card img{display:block;width:100%;height:300px;object-fit:cover;border-radius:30px / 36px;background:#ece2cf;}
  .q-tag{
    display:block;text-align:center;color:#fff;font-weight:800;font-size:1.05rem;
    margin:16px 0 14px;text-shadow:0 2px 0 rgba(0,0,0,.14);
  }
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{
    font-family:inherit;font-weight:700;font-size:1.08rem;text-align:left;color:var(--ink);
    background:#fff;border:none;border-radius:26px / 32px;padding:15px 18px;cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15);position:relative;
    transition:transform .1s cubic-bezier(.34,1.56,.64,1),box-shadow .1s;
  }
  .opt:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .opt.correct{background:var(--mint);color:#063d2c;box-shadow:0 5px 0 #129b78;animation:bounce .45s;}
  .opt.wrong{background:var(--pink);color:#fff;box-shadow:0 5px 0 #c01f5d;animation:shake .4s;}
  .opt:disabled{cursor:default;}
  .opt .tick{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.3rem;}
  @keyframes bounce{0%,100%{transform:none;}30%{transform:scale(1.04);}60%{transform:scale(.99);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}

  .feedback{text-align:center;min-height:30px;margin:16px 0 4px;color:#fff;font-weight:800;font-size:1.15rem;text-shadow:0 2px 0 rgba(0,0,0,.14);}
  .next-btn{
    font-family:inherit;font-weight:800;letter-spacing:.06em;font-size:1.1rem;
    background:var(--lemon);color:var(--ink);border:none;border-radius:var(--sq);
    padding:17px;cursor:pointer;width:100%;box-shadow:0 6px 0 #d9a800;
    transition:transform .12s,box-shadow .12s,opacity .2s;
  }
  .next-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #d9a800;}
  .next-btn[disabled]{opacity:.32;box-shadow:none;cursor:default;}

  /* ============ RISULTATO ============ */
  .result{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;}
  .trophy{font-size:3.4rem;animation:spin 1.1s cubic-bezier(.34,1.56,.64,1);}
  @keyframes spin{from{transform:scale(0) rotate(-180deg);}to{transform:none;}}
  .res-verdict{color:var(--lemon);font-weight:800;letter-spacing:.2em;text-transform:uppercase;font-size:.82rem;margin:8px 0 2px;}
  .score-ring{
    width:170px;height:170px;margin:10px auto;border-radius:50%;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    background:conic-gradient(var(--lemon) var(--deg,0deg), rgba(255,255,255,.22) 0deg);
    box-shadow:0 10px 30px rgba(28,19,64,.4);
  }
  .score-ring .inner{
    width:138px;height:138px;border-radius:50%;background:var(--grape-d);
    display:flex;flex-direction:column;justify-content:center;align-items:center;
  }
  .score-ring b{color:#fff;font-size:3.4rem;line-height:1;font-weight:800;}
  .score-ring span{color:#ffe9d6;font-weight:700;font-size:1rem;margin-top:2px;}
  .verdict-line{color:#fff;font-size:1.6rem;font-weight:800;margin:8px 18px 4px;text-shadow:0 2px 0 rgba(0,0,0,.14);}
  .verdict-sub{color:#ffe9d6;font-weight:600;font-size:1.02rem;margin:8px 22px 22px;line-height:1.45;}
  .recap{
    text-align:left;background:rgba(255,255,255,.95);border-radius:26px;
    padding:6px;margin:6px 0 22px;max-height:240px;overflow-y:auto;
  }
  .recap div{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:11px 14px;border-radius:18px;font-weight:700;font-size:.96rem;}
  .recap .ok{color:#0a7d5c;}
  .recap .ko{color:#c01f5d;}
  .recap .ko .r{color:#8a7d8e;font-weight:600;font-size:.82rem;font-style:italic;}
  .start-over{
    font-family:inherit;font-weight:800;letter-spacing:.04em;font-size:1.05rem;
    background:var(--mint);color:#063d2c;border:none;border-radius:var(--sq);
    padding:17px;cursor:pointer;width:100%;box-shadow:0 6px 0 #129b78;
    transition:transform .12s,box-shadow .12s;
  }
  .start-over:active{transform:translateY(4px);box-shadow:0 2px 0 #129b78;}
  footer{text-align:center;color:rgba(255,255,255,.6);font-weight:700;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;padding:14px 0 4px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="hero">
      <span class="badge">🎉 Cena di classe · 5ª</span>
      <h1><span class="word">Indovina</span><span class="word"><span class="pop">l'Alunno!</span></span></h1>
      <p>Li avete cresciuti per cinque anni.<br>Ma li riconoscete <b>da piccoli?</b></p>
    </div>
    <p class="pick">👇 Prof, tocca il tuo nome</p>
    <div id="profGrid" class="prof-grid"></div>
  </section>

  <!-- ===== GIOCO ===== -->
  <section id="game" class="screen">
    <div class="topbar">
      <span class="pill-who" id="whoLabel">Prof</span>
      <div class="pbar"><i id="pbarFill"></i></div>
      <span class="count" id="counter">1/23</span>
    </div>
    <div class="photo-card"><img id="photo" alt="Bambino da indovinare"></div>
    <span class="q-tag">Chi è questo bambino? 🤔</span>
    <div class="options" id="options"></div>
    <p class="feedback" id="feedback"></p>
    <button class="next-btn" id="nextBtn" disabled>Avanti →</button>
  </section>

  <!-- ===== RISULTATO ===== -->
  <section id="end" class="screen">
    <div class="result">
      <div class="trophy" id="trophy">🏆</div>
      <p class="res-verdict">La tua pagella</p>
      <div class="score-ring" id="ring"><div class="inner"><b id="finalScore">0</b><span id="finalOf">/ 23</span></div></div>
      <p class="verdict-line" id="verdictLine"></p>
      <p class="verdict-sub" id="verdictSub"></p>
      <div class="recap" id="recap"></div>
      <button class="start-over" id="restartBtn">↻ Passa al prossimo prof</button>
    </div>
  </section>

  <footer>Indovina l'Alunno · 5ª</footer>
</div>

<script>
/* ===================== DATI ===================== */
const PROFS = ["Biasi","Basilico","Procopio","Fusetti","Visnoviz",
               "Cattaneo","Ceschina","Travaglini","Zaffaroni","Capra","Borghi"];

// Per aggiungere alunni: aggiungi una riga e carica la foto in /foto
const STUDENTS = [
  {n:"Alessandro Cogliati",   f:"AlessandroCogliati.jpeg"},
  {n:"Alessia Borghi",        f:"AlessiaBorghi.jpeg"},
  {n:"Anita Vernazzano",      f:"AnitaVernazzano.jpeg"},
  {n:"Anna Avezza",           f:"AnnaAvezza.jpeg"},
  {n:"Chiara Boraschi",       f:"ChiaraBoraschi.jpeg"},
  {n:"Edoardo Valerio",       f:"EdoardoValerio.jpeg"},
  {n:"Filippo Tragella",      f:"FilippoTragella.jpeg"},
  {n:"Francesco Balzaretti",  f:"FrancescoBalzaretti.jpeg"},
  {n:"Francesco Giardina",    f:"FrancescoGiardina.jpeg"},
  {n:"Francesco Paolillo",    f:"FrancescoPaolillo.jpeg"},
  {n:"Giacomo Castiglioni",   f:"GiacomoCastiglioni.jpeg"},
  {n:"Giorgia De Vita",       f:"GiorgiaDeVita.jpeg"},
  {n:"Lorenzo Cattaneo",      f:"LorenzoCattaneo.jpeg"},
  {n:"Martina Locati",        f:"MartinaLocati.jpeg"},
  {n:"Nicolò Sordelli",       f:"NicoloSordelli.jpeg"},
  {n:"Riccardo Lonardoni",    f:"RiccardoLonardoni.jpg"},
  {n:"Simone Tettamanzi",     f:"SimoneTettamanzi.jpeg"},
  {n:"Sofia Morlino",         f:"SofiaMorlino.jpeg"},
  {n:"Stefano Galante",       f:"StefanoGalante.jpeg"},
  {n:"Tommaso Porcu",         f:"TommasoPorcu.jpeg"},
  {n:"Tommaso Ravera",        f:"TommasoRavera.jpeg"},
  {n:"Valentina Tomba",       f:"ValentinaTomba.jpeg"},
  {n:"Zainab Mohamed",        f:"ZainabMohamed.jpeg"}
];

const ALL_NAMES = STUDENTS.map(s => s.n);
const NUM_OPTIONS = 6;

let prof="", order=[], step=0, score=0, answers=[];
const $ = id => document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');window.scrollTo(0,0);}

function buildHome(){
  const g=$('profGrid'); g.innerHTML='';
  PROFS.forEach(p=>{
    const b=document.createElement('button');
    b.className='prof-btn';
    b.innerHTML='<span class="pre">Prof.</span>'+p;
    b.onclick=()=>startGame(p);
    g.appendChild(b);
  });
}

function startGame(p){
  prof=p; order=shuffle(STUDENTS.map((_,i)=>i)); step=0; score=0; answers=[];
  $('whoLabel').textContent='Prof. '+p;
  show('game'); renderQuestion();
}

function renderQuestion(){
  const s=STUDENTS[order[step]];
  $('counter').textContent=(step+1)+'/'+STUDENTS.length;
  $('pbarFill').style.width=(step/STUDENTS.length*100)+'%';
  const img=$('photo'); img.src='./foto/'+s.f;
  $('feedback').textContent='';
  const nb=$('nextBtn'); nb.disabled=true;
  nb.textContent=(step===STUDENTS.length-1)?'Vedi la pagella 🎓':'Avanti →';

  const distract=shuffle(ALL_NAMES.filter(n=>n!==s.n)).slice(0,NUM_OPTIONS-1);
  const opts=shuffle([s.n,...distract]);
  const box=$('options'); box.innerHTML='';
  // ri-triggera l'animazione della foto
  const card=img.parentElement; card.style.animation='none'; void card.offsetWidth; card.style.animation='';
  opts.forEach(name=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=name;
    b.onclick=()=>choose(b,name,s);
    box.appendChild(b);
  });
}

function choose(btn,name,s){
  const ok=name===s.n;
  [...$('options').children].forEach(b=>{
    b.disabled=true;
    if(b.textContent===s.n){b.classList.add('correct');b.innerHTML+='<span class="tick">✓</span>';}
    else if(b===btn){b.classList.add('wrong');b.innerHTML+='<span class="tick">✗</span>';}
  });
  if(ok){score++;$('feedback').textContent='Esatto! 🎯';}
  else{$('feedback').textContent='Ops, era '+s.n;}
  answers.push({name:s.n,given:name,ok});
  $('nextBtn').disabled=false;
}

$('nextBtn').onclick=()=>{step++;(step>=STUDENTS.length)?endGame():renderQuestion();};

function endGame(){
  $('pbarFill').style.width='100%';
  const tot=STUDENTS.length, pct=score/tot;
  $('finalScore').textContent=score;
  $('finalOf').textContent='/ '+tot;
  $('ring').style.setProperty('--deg',(pct*360)+'deg');

  let line,sub,tro;
  if(pct===1){line='Memoria fotografica! 🤯';sub='Tutti, dal primo all\u2019ultimo. Leggendario.';tro='👑';}
  else if(pct>=.75){line='Promosso a pieni voti! 🌟';sub='Li conosci davvero, questi ragazzi.';tro='🏆';}
  else if(pct>=.5){line='Promosso! 👏';sub='Te la sei cavata. Qualcuno è cambiato parecchio, eh?';tro='🎓';}
  else if(pct>=.25){line='Rimandato a settembre 📚';sub='Diciamo che li riconosci meglio in aula…';tro='😅';}
  else{line='Bocciato, con affetto 💔';sub='Senza zaino e interrogazioni è tutta un\u2019altra storia!';tro='🙈';}
  $('verdictLine').textContent=line; $('verdictSub').textContent=sub; $('trophy').textContent=tro;

  const r=$('recap'); r.innerHTML='';
  answers.forEach(a=>{
    const d=document.createElement('div');
    if(a.ok){d.className='ok';d.innerHTML='<span>✓ '+a.name+'</span>';}
    else{d.className='ko';d.innerHTML='<span>✗ '+a.name+'</span><span class="r">tu: '+a.given+'</span>';}
    r.appendChild(d);
  });
  show('end');
}

$('restartBtn').onclick=()=>show('home');
buildHome();
</script>
</body>
</html>
